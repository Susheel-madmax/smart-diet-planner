<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Smart Diet Planner</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #0D1B2A 0%, #1a3a2a 50%, #0f2d1f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(46, 204, 113, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(26, 188, 156, 0.10) 0%, transparent 50%);
    }

    .auth-container {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 28px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.6s ease;
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--green), var(--teal));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(46, 204, 113, 0.4);
    }

    .logo h1 {
      font-size: 26px;
      color: var(--navy);
      margin-bottom: 4px;
    }

    .logo p {
      color: var(--slate);
      font-size: 14px;
    }

    .auth-tabs {
      display: flex;
      background: var(--mist);
      border-radius: 50px;
      padding: 4px;
      margin-bottom: 32px;
    }

    .auth-tabs a {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      color: var(--slate);
      transition: var(--transition);
    }

    .auth-tabs a.active {
      background: var(--white);
      color: var(--green);
      box-shadow: var(--shadow-sm);
    }

    .btn-primary {
      width: 100%;
      justify-content: center;
      padding: 14px;
      font-size: 16px;
    }

    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--slate);
    }

    .register-link a {
      color: var(--green);
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
